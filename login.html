<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Entrar - Vault Experience</title>

<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/store.css" />
<link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

</head>

<body>

  <a
  href="index.html"
  class="back-button"
>

  <i class="ti ti-arrow-left"></i>

</a>

  <main class="login-page">

    <!-- LADO ESQUERDO -->
    <section class="login-left">

      <div class="login-logo">
  <img
    src="assets/logo.png"
    alt="Vault Experience"
  >
</div>

      <h1>

        Entre em sua conta e
        <span>negocie com segurança!</span>

      </h1>

      <p>

        Acesse e aproveite uma experiência
        segura dentro da Vault Experience.

      </p>

    </section>

    <!-- LADO DIREITO -->
    <section class="login-right">

      <div class="login-card">

        <h2>
          Entrar
        </h2>

        <!-- FORM -->
        <form id="login-form">

          <div class="input-group">

            <label>
              Celular, email ou usuário
            </label>

            <input
              type="text"
              id="login-user"
              placeholder="Digite seu usuário"
            >

          </div>

          <div class="input-group">

            <label>
              Senha
            </label>

            <input
              type="password"
              id="login-password"
              placeholder="Digite sua senha"
            >

          </div>

          <button
            type="submit"
            id="login-submit"
            disabled
          >
            Entrar
          </button>

        </form>

        <!-- DIVISOR -->
        <div class="divider">

          <span></span>

          <p>ou</p>

          <span></span>

        </div>

        <!-- GOOGLE -->
        <button id="google-login">

          <i class="ti ti-brand-google"></i>

          Entrar com Google

        </button>

        <!-- CRIAR CONTA -->
        <button id="create-account">

          Criar conta

        </button>

      </div>

    </section>

  </main>

  <script src="js/login.js"></script>
  <script src="js/store.js"></script>

</body>
